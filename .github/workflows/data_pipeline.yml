name: Scheduled Data Scraping & ML Pipeline

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        python -m spacy download en_core_web_sm

    - name: Run Reddit Scraper
      run: |
        # Runs from root, outputs raw data to data/ folder
        python Reddit_Scraper/reddit_scraper.py

    - name: Execute NLP & ML Pipeline Notebooks
      run: |
        # Navigate into the Notebooks directory so relative paths (../data/) resolve correctly
        cd Notebooks
        jupyter nbconvert --to notebook --execute --inplace Cleaning.ipynb
        jupyter nbconvert --to notebook --execute --inplace Sentiment_analysis.ipynb
        jupyter nbconvert --to notebook --execute --inplace nlp_features.ipynb
        jupyter nbconvert --to notebook --execute --inplace feature_engineering.ipynb
        jupyter nbconvert --to notebook --execute --inplace Virality.ipynb
        jupyter nbconvert --to notebook --execute --inplace EDA_storytelling.ipynb

    - name: Commit and Push Updated Data & Metrics
      run: |
        git config --local user.email "nishkmistry@users.noreply.github.com"
        git config --local user.name "data_pipeline[bot]"
        
        git add data/
        git commit -m "Automated pipeline run: Updated data & insights $(date -u +'%Y-%m-%d %H:%M:%S' UTC)" || echo "No changes detected in data matrix."
        git push