name: ML Pipeline & Deployment

on:
  push:
    paths:
      - 'data/raw_posts.csv' # ONLY triggers when this specific file is updated
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        python -m spacy download en_core_web_sm

    - name: Execute NLP & ML Pipeline Notebooks
      run: |
        cd Notebooks
        # The scraper is removed; it goes straight to cleaning and ML
        jupyter nbconvert --to notebook --execute --inplace Cleaning.ipynb
        jupyter nbconvert --to notebook --execute --inplace Sentiment_analysis.ipynb
        jupyter nbconvert --to notebook --execute --inplace nlp_features.ipynb
        jupyter nbconvert --to notebook --execute --inplace feature_engineering.ipynb
        jupyter nbconvert --to notebook --execute --inplace Virality.ipynb
        jupyter nbconvert --to notebook --execute --inplace EDA_Storytelling.ipynb

    - name: Commit and Push Updated Data & Metrics
      run: |
        git config --local user.email "nishkmistry@users.noreply.github.com"
        git config --local user.name "data_pipeline[bot]"
        
        git add --all
        git commit -m "Automated pipeline run: Updated ML models & insights $(date -u +'%Y-%m-%d %H:%M:%S' UTC)" || echo "No changes detected."
        git push