name: Code Quality & Maintenance (CI)

on:
  push:
    branches: [ main, master ]
    paths-ignore:
      - 'data/**' # Do not trigger CI when the data pipeline updates CSVs/images
  pull_request:
    branches: [ main, master ]

jobs:
  quality-check:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Linting Tools
      run: |
        python -m pip install --upgrade pip
        pip install flake8 black

    - name: Code Formatting Check (Black)
      run: |
        # Updated path to match your folder capitalization exactly
        black --check app/ Reddit_Scraper/reddit_scraper.py

    - name: Lint for Errors & Syntax Issues (Flake8)
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings.
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics